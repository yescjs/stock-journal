name: E2E Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  playwright:
    name: Playwright E2E (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci

      - name: Playwright 브라우저 설치 (Chromium만)
        run: npx playwright install --with-deps chromium

      - name: E2E 테스트 실행
        run: npx playwright test tests/landing.spec.ts tests/responsive.spec.ts --project=chromium
        env:
          CI: true
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: 테스트 리포트 업로드 (항상)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

      - name: 실패 스크린샷·트레이스 업로드
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-${{ github.run_id }}
          path: test-results/
          retention-days: 7

# ── 확장 가이드 ────────────────────────────────────────────────────────────────
# Supabase secrets 설정 후 게스트 모드 테스트 추가 가능:
#   npx playwright test tests/landing.spec.ts tests/responsive.spec.ts \
#     tests/auth.spec.ts tests/trade-crud.spec.ts --project=chromium
#
# GitHub Secrets 등록 위치:
#   Repository → Settings → Secrets and variables → Actions → New repository secret
#   - NEXT_PUBLIC_SUPABASE_URL
#   - NEXT_PUBLIC_SUPABASE_ANON_KEY
# ──────────────────────────────────────────────────────────────────────────────
